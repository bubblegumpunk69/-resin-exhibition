<script>
/* ═══ Cyberpunk grid background ═══ */
(function(){
  var cv=document.getElementById('cyberBg');
  var ctx=cv.getContext('2d');
  var W,H;
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W;cv.height=H;
    draw();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    var horizon=H*0.55;
    var vanX=W*0.5;
    var col='#D4AA30';

    /* Perspective grid floor */
    ctx.save();
    var rows=20;
    for(var r=0;r<rows;r++){
      var t=r/rows;
      var y=horizon+Math.pow(t,1.8)*(H-horizon);
      var alpha=0.08+t*0.12;
      ctx.strokeStyle=col;
      ctx.globalAlpha=alpha;
      ctx.lineWidth=0.5;
      ctx.beginPath();
      ctx.moveTo(0,y);
      ctx.lineTo(W,y);
      ctx.stroke();
    }

    var cols=24;
    for(var c=-cols/2;c<=cols/2;c++){
      var spread=c/(cols/2);
      var alpha2=0.06+Math.abs(spread)*0.08;
      ctx.globalAlpha=alpha2;
      ctx.lineWidth=0.5;
      ctx.beginPath();
      ctx.moveTo(vanX,horizon);
      ctx.lineTo(vanX+spread*W*1.2,H);
      ctx.stroke();
    }
    ctx.restore();

    /* Horizontal scan lines — sparse, thin */
    ctx.strokeStyle=col;
    ctx.lineWidth=0.5;
    var scanPositions=[0.12,0.28,0.44,0.88,0.94];
    for(var s=0;s<scanPositions.length;s++){
      var sy=scanPositions[s]*H;
      ctx.globalAlpha=0.08;
      ctx.beginPath();
      ctx.moveTo(0,sy);
      ctx.lineTo(W,sy);
      ctx.stroke();
    }

    /* Vertical accent lines */
    ctx.globalAlpha=0.08;
    ctx.beginPath();ctx.moveTo(W*0.06,0);ctx.lineTo(W*0.06,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W*0.94,0);ctx.lineTo(W*0.94,H);ctx.stroke();

    /* Corner brackets */
    ctx.globalAlpha=0.15;
    ctx.lineWidth=1;
    var bk=20;
    /* TL */
    ctx.beginPath();ctx.moveTo(16,16+bk);ctx.lineTo(16,16);ctx.lineTo(16+bk,16);ctx.stroke();
    /* TR */
    ctx.beginPath();ctx.moveTo(W-16-bk,16);ctx.lineTo(W-16,16);ctx.lineTo(W-16,16+bk);ctx.stroke();
    /* BL */
    ctx.beginPath();ctx.moveTo(16,H-16-bk);ctx.lineTo(16,H-16);ctx.lineTo(16+bk,H-16);ctx.stroke();
    /* BR */
    ctx.beginPath();ctx.moveTo(W-16-bk,H-16);ctx.lineTo(W-16,H-16);ctx.lineTo(W-16,H-16-bk);ctx.stroke();

    ctx.globalAlpha=1;
  }

  resize();
  window.addEventListener('resize',resize,{passive:true});
})();
</script>

        className:'tc group relative bg-[#111] border border-[#1E1E1E] rounded-sm p-3 flex flex-col justify-between text-left hover:border-white/10 hover:bg-white/[0.03] transition-all duration-300 overflow-hidden',
        onClick:(function(t){return function(){props.onSelect(t);};})(TRACKS[i])
      },
        h('span',{className:'text-white/20 text-[9px] relative z-10'},String(i+1).padStart(2,'0')),
        h('div',{className:'cell-wave','data-wave-seed':String(i)}),
        h('span',{className:'text-white/70 text-[10px] tracking-wide mt-1 group-hover:text-white transition-colors relative z-10'},TRACKS[i])
      )
    );
  }

  return h('div',{className:'fixed inset-0 flex flex-col items-center justify-center'},
    h('div',{className:'flex items-center gap-4 mb-6'},
      h('button',{className:'flex items-center gap-2 text-white/40 hover:text-white text-[11px] tracking-[0.12em] uppercase transition-colors',onClick:props.onBack},
        h('span',{className:'text-sm'},'←'),' Back'
      ),
      h('div',{className:'w-px h-4 bg-white/10'}),
      h('span',{className:'text-white text-[13px] tracking-[0.15em] uppercase'},props.genre.label)
    ),
    h('div',{className:'grid grid-cols-4 grid-rows-4 gap-5',style:{width:'min(48vmin,480px)',height:'min(48vmin,480px)'}},cells)
  );
}

function DetailView(props){
  var s=useState(STEMS.map(function(){return{muted:false,solo:false};}));
  var stems=s[0],setStems=s[1];
  var p=useState(false);
  var playing=p[0],setPlaying=p[1];

  var prompt=PROMPTS[props.track]||'atmospheric texture. layered pads, subtle percussion, organic warmth, space between the notes.';

  function toggleM(i){setStems(function(prev){return prev.map(function(x,j){return j===i?{muted:!x.muted,solo:x.solo}:x;});});}
  function toggleS(i){setStems(function(prev){return prev.map(function(x,j){return j===i?{muted:x.muted,solo:!x.solo}:x;});});}

  var rows=[];
  for(var i=0;i<STEMS.length;i++){
    rows.push(
      h('div',{key:STEMS[i],className:'bg-[#111] border border-[#1E1E1E] rounded-sm p-4 flex items-center gap-4'},
        h('button',{className:'w-7 h-7 rounded-full border border-white/10 flex items-center justify-center hover:border-[#D4AA30]/40 transition-colors shrink-0',onClick:function(){setPlaying(!playing);}},
          playing?h('span',{className:'text-[#D4AA30] text-[9px]'},'❚❚'):h('span',{className:'text-white/40 text-[8px] ml-0.5'},'▶')
        ),
        h('span',{className:'text-white/50 text-[10px] tracking-wider uppercase w-24 shrink-0'},STEMS[i]),
        h('button',{
          className:'w-6 h-6 rounded-full text-[9px] font-bold flex items-center justify-center transition-all border '+(stems[i].muted?'bg-red-500/20 text-red-400 border-red-500/30':'text-white/25 border-white/10 hover:border-white/20'),
          onClick:(function(idx){return function(){toggleM(idx);};})(i)
        },'M'),
        h('button',{
          className:'w-6 h-6 rounded-full text-[9px] font-bold flex items-center justify-center transition-all border '+(stems[i].solo?'bg-[#D4AA30]/20 text-[#D4AA30] border-[#D4AA30]/30':'text-white/25 border-white/10 hover:border-white/20'),
          onClick:(function(idx){return function(){toggleS(idx);};})(i)
        },'S'),
        h('div',{className:'flex-1 h-8 relative flex items-center'},
          h('div',{className:'wave-bg absolute inset-0 opacity-30 rounded-sm'}),
          h('div',{className:'wave-fill absolute left-0 top-0 bottom-0 rounded-sm transition-all duration-700',style:{width:playing?'35%':'0%'}})
        )
      )

  }

  return h('div',{className:'fixed inset-0 flex flex-col p-8 overflow-y-auto'},
    h('div',{className:'flex items-center justify-between mb-8'},
      h('div',{className:'flex items-center gap-4'},
        h('button',{className:'flex items-center gap-2 text-white/40 hover:text-white text-[11px] tracking-[0.12em] uppercase transition-colors',onClick:props.onBack},
          h('span',{className:'text-sm'},'←'),' Back to Grid'
        ),
        h('div',{className:'w-px h-4 bg-white/10'}),
        h('span',{className:'text-white text-[13px] tracking-[0.15em] uppercase'},props.track)
      ),
      h('span',{className:'text-white/30 text-[10px] tracking-wider'},'Created by Michael · Pro')
    ),
    h('div',{className:'flex-1 flex gap-8 max-w-5xl mx-auto w-full'},
      h('div',{className:'flex-1 flex flex-col gap-3'},
        h('div',{className:'bg-[#111] border border-[#1E1E1E] rounded-sm p-5 mb-2'},
          h('div',{className:'text-[10px] text-[#D4AA30]/60 tracking-[0.2em] uppercase mb-2'},'prompt'),
          h('p',{className:'text-white/50 text-[11px] leading-relaxed'},prompt)
        ),
        rows
      ),
      h('div',{className:'w-72 shrink-0 flex flex-col gap-4'},
        h('div',{className:'bg-[#111] border border-[#1E1E1E] rounded-sm p-6 flex flex-col gap-5'},
          h('div',{className:'flex items-center justify-between'},
            h('span',{className:'text-[10px] text-white/30 tracking-[0.2em] uppercase'},'stem pack'),
            h('span',{className:'text-white text-sm'},'$15.00')
          ),
          h('button',{className:'w-full py-3 rounded-sm text-[11px] font-bold tracking-[0.15em] uppercase transition-all hover:brightness-110',style:{background:'#D4AA30',color:'#0A0A0A'}},'Collect Stem Pack →'),
          h('button',{className:'w-full py-3 rounded-sm border border-white/10 text-white/50 text-[11px] tracking-[0.1em] uppercase hover:border-white/20 hover:text-white/70 transition-all'},'Open in DR-1 Engine')
        ),
        h('div',{className:'bg-[#111] border border-[#1E1E1E] rounded-sm p-4 flex items-center gap-3'},
          h('div',{className:'w-3 h-3 rounded-full',style:{background:'#D4AA30',opacity:0.4}}),
          h('span',{className:'text-white/30 text-[10px] tracking-wider uppercase'},props.genre.label)
        )
      )
    )
  );
}

function App(){
  var v=useState('egg');
  var view=v[0],setView=v[1];
  var g=useState(null);
  var genre=g[0],setGenre=g[1];
  var t=useState(null);
  var track=t[0],setTrack=t[1];

  if(view==='egg') return h(EggView,{onSelect:function(gen){setGenre(gen);setView('grid');}});
  if(view==='grid') return h(GridView,{genre:genre,onBack:function(){setView('egg');},onSelect:function(tr){setTrack(tr);setView('detail');}});
  if(view==='detail') return h(DetailView,{track:track,genre:genre,onBack:function(){setView('grid');}});
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));

/* ═══ Waveform animation for grid cells ═══ */
var _waveRAF=null;
function initWaves(){
  if(_waveRAF){cancelAnimationFrame(_waveRAF);_waveRAF=null;}
  var containers=document.querySelectorAll('.cell-wave');
  if(!containers.length){return;}
  var canvases=[];
  containers.forEach(function(el){
    if(el.querySelector('canvas'))return;
    var cv=document.createElement('canvas');
    cv.width=120;cv.height=60;
    cv.style.width='100%';cv.style.height='100%';
    el.appendChild(cv);
  });
  document.querySelectorAll('.cell-wave canvas').forEach(function(cv){
    var el=cv.parentElement;
    canvases.push({ctx:cv.getContext('2d'),w:120,h:60,seed:parseFloat(el.getAttribute('data-wave-seed'))||0});
  });

  function draw(){
    var t=performance.now()*0.001;
    for(var c=0;c<canvases.length;c++){
      var cv=canvases[c],ctx=cv.ctx,W=cv.w,H=cv.h,s=cv.seed;
      ctx.clearRect(0,0,W,H);
      ctx.strokeStyle='#D4AA30';
      ctx.lineWidth=1;
      ctx.beginPath();
      for(var x=0;x<W;x++){
        var nx=x/W;
        var y=H/2
          +Math.sin(nx*6+t*1.2+s*2)*H*0.15
          +Math.sin(nx*12+t*0.8+s*3.7)*H*0.08
          +Math.sin(nx*3+t*1.8+s*1.3)*H*0.10;
        if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.stroke();

      ctx.strokeStyle='rgba(231,184,148,0.3)';
      ctx.beginPath();
      for(var x2=0;x2<W;x2++){
        var nx2=x2/W;
        var y2=H/2
          +Math.sin(nx2*8+t*0.6+s*4.1)*H*0.12
          +Math.sin(nx2*4+t*1.4+s*0.9)*H*0.08;
        if(x2===0)ctx.moveTo(x2,y2);else ctx.lineTo(x2,y2);
      }
      ctx.stroke();
    }
    _waveRAF=requestAnimationFrame(draw);
  }
  draw();
}

var _waveRunning=false;
var _waveObserver=new MutationObserver(function(){
  if(document.querySelector('.cell-wave') && !_waveRunning){
    _waveRunning=true;
    setTimeout(initWaves,50);
  }
  if(!document.querySelector('.cell-wave')){
    _waveRunning=false;
  }
});
_waveObserver.observe(document.getElementById('root'),{childList:true,subtree:true});
</script>
